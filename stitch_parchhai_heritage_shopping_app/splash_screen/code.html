<style>
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes texture-drift {
            from { background-position: 0 0; }
            to { background-position: 100px 100px; }
        }
        .animate-fade-in { animation: fade-in-up 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .delay-300 { animation-delay: 0.3s; }
        .delay-600 { animation-delay: 0.6s; }
        
        .fabric-texture {
            background-image: radial-gradient(#ffffff05 1px, transparent 0);
            background-size: 4px 4px;
            mask-image: linear-gradient(to bottom, transparent, black, transparent);
        }
        
        .inner-glow {
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        .gold-shimmer {
            background: linear-gradient(135deg, #B8893B 0%, #F3BE6A 50%, #B8893B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shimmer 4s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-primary-container text-on-primary antialiased overflow-hidden">
<!-- Splash Screen Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-center bg-primary-container overflow-hidden">
<!-- Texture Layer -->
<div class="absolute inset-0 fabric-texture opacity-30 pointer-events-none"></div>
<!-- Subtle Vignette -->
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_transparent_0%,_#041534_90%)] pointer-events-none"></div>
<!-- Brand Identity Section -->
<div class="z-10 flex flex-col items-center space-y-6">
<!-- Logo Icon (Symbolizing Depth/Shadow) -->
<div class="animate-fade-in flex items-center justify-center w-24 h-24 mb-4 border border-on-tertiary-container/20 rounded-full">
<span class="material-symbols-outlined text-[48px] text-on-tertiary-container" style="font-variation-settings: 'FILL' 1;">
                    eco
                </span>
</div>
<!-- Brand Name (Using Caslon for Heritage feel) -->
<div class="text-center animate-fade-in delay-300">
<h1 class="font-display-lg-mobile text-display-lg-mobile text-inverse-on-surface tracking-[0.2em] mb-2 uppercase">
                    PARCHHAI
                </h1>
<div class="h-px w-12 bg-on-tertiary-container mx-auto opacity-50"></div>
<p class="font-label-sm text-label-sm text-on-primary-container mt-4 tracking-[0.3em] uppercase opacity-80">
                    Heritage &amp; Archive
                </p>
</div>
</div>
<!-- Atmospheric Visual Anchor (High-end UI Pattern) -->
<div class="absolute bottom-20 w-full px-margin-mobile flex flex-col items-center animate-fade-in delay-600">
<div class="relative w-full max-w-[280px] aspect-[4/5] rounded-xl overflow-hidden border border-white/5 shadow-2xl">
<img alt="Parchhai Brand Image" class="w-full h-full object-cover grayscale opacity-40 mix-blend-luminosity scale-110 hover:scale-100 transition-transform duration-1000" data-alt="A macro close-up photograph of a dark indigo, high-quality wool fabric with a rich, tactile weave pattern. The lighting is moody and directional, casting subtle shadows that highlight the intricate texture of the threads. The overall aesthetic is one of heritage luxury and quiet sophistication, utilizing a deep navy and charcoal color palette that feels authoritative and timeless." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBPH4Ud7bo8Vw0dKgmybi66ork77LoHVOsAJ1ypOiu5KnjKy0lNtiQXLjiJyIXrNyedLeBo69O9da01-Apg61UmhV_3hJ4-e0G8QBh2LHy0F_15q4ftTLyoHLUYQKLr8foLoFYS0jrgLQcATxtLx9HH_8VMjymlbDW0Nn8FMbEZziUx750WHfD1INVxRmRxpyE6pZ5SXDKTEsJ62liEQHUiOPeB87gHylabCmWyFWpfmeGoOMfnvwhpF8xDnHiyDeLdHTfRn-CbYtsy"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary-container via-transparent to-transparent"></div>
</div>
<!-- Progress / Loading Indicator -->
<div class="mt-12 w-48 h-[1px] bg-white/10 relative overflow-hidden">
<div class="absolute inset-0 bg-on-tertiary-container w-1/3 animate-[loading_2.5s_ease-in-out_infinite]"></div>
</div>
</div>
<!-- Footer Identity -->
<div class="absolute bottom-8 flex flex-col items-center opacity-40 animate-fade-in delay-600">
<span class="font-label-sm text-[10px] tracking-widest text-on-primary-container uppercase">
                Est. 1984 • Fine Craftsmanship
            </span>
</div>
</main>
<!-- JavaScript for Micro-interactions -->
<script>
        // Custom animation for the progress bar
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes loading {
                0% { transform: translateX(-100%); }
                50% { transform: translateX(100%); }
                100% { transform: translateX(-100%); }
            }
        `;
        document.head.appendChild(style);

        // Soft click interaction to simulate moving into the app
        document.body.addEventListener('click', () => {
            const container = document.querySelector('main');
            container.style.transition = 'opacity 0.8s ease-out, transform 1s ease-in';
            container.style.opacity = '0';
            container.style.transform = 'scale(1.05)';
            
            // In a real app, this would navigate to the Home screen
            setTimeout(() => {
                console.log("Navigating to Home Dashboard...");
            }, 800);
        });
    </script>

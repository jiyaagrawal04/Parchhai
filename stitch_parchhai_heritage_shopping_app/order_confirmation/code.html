<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary dark:text-primary-fixed tracking-tight">PARCHHAI</h1>
<button class="material-symbols-outlined text-primary dark:text-primary-fixed hover:opacity-80 transition-opacity active:scale-95 duration-150" data-icon="shopping_bag">shopping_bag</button>

<main class="min-h-screen pt-24 pb-32 px-margin-mobile flex flex-col items-center justify-center text-center">

</div>

</div>
<!-- Decorative texture -->

<path d="M0 0h100v100H0z" fill="url(#pattern)"></path>
<defs>

<path d="M-1 1l2-2M0 10l10-10M9 11l2-2" stroke="currentColor" stroke-width="0.5"></path>

</svg>
</div>
</section>
<!-- Product Preview (Single Item for Premium Focus) -->

<!-- BottomNavBar (Hidden for success screen as per focus guidelines, but kept for shell integrity logic if needed. 
         However, the instructions state: "If the user is in a focused journey... hide the shell". 
         Success screen is a definitive end of journey, navigation is suppressed.) -->
<!-- Inline Interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Subtle parallax effect on the success checkmark on scroll
            window.addEventListener('scroll', () => {
                const scrolled = window.pageYOffset;
                const checkmark = document.querySelector('.material-symbols-outlined');
                if (checkmark) {
                    checkmark.style.transform = `translateY(${scrolled * 0.05}px)`;
                }
            });
            
            // Interaction feedback for buttons
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    let x = e.clientX - e.target.offsetLeft;
                    let y = e.clientY - e.target.offsetTop;
                    let ripples = document.createElement('span');
                    ripples.style.left = x + 'px';
                    ripples.style.top = y + 'px';
                    this.appendChild(ripples);
                    setTimeout(() => { ripples.remove() }, 600);
                });
            });
        });
    </script>

<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;700&amp;family=Hanken+Grotesk:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-fixed-variant": "#614000",
                    "on-error-container": "#93000a",
                    "on-secondary-fixed": "#410000",
                    "surface-dim": "#ded9d1",
                    "on-surface-variant": "#45464e",
                    "surface-container-high": "#ece8df",
                    "tertiary-fixed": "#ffddaf",
                    "primary-fixed-dim": "#b7c6ee",
                    "secondary-fixed": "#ffdad4",
                    "surface-bright": "#fef9f0",
                    "surface-tint": "#4f5e81",
                    "error": "#ba1a1a",
                    "outline-variant": "#c5c6cf",
                    "on-tertiary": "#ffffff",
                    "tertiary": "#221400",
                    "surface-container-highest": "#e7e2d9",
                    "on-surface": "#1d1c16",
                    "on-secondary-container": "#721b12",
                    "on-primary-fixed": "#0a1a3a",
                    "on-secondary": "#ffffff",
                    "secondary-fixed-dim": "#ffb4a8",
                    "on-primary-fixed-variant": "#384668",
                    "surface-container-low": "#f8f3ea",
                    "on-error": "#ffffff",
                    "on-secondary-fixed-variant": "#82271c",
                    "on-tertiary-container": "#b98a3c",
                    "secondary-container": "#fc8270",
                    "background": "#fef9f0",
                    "secondary": "#a23e30",
                    "tertiary-container": "#3c2700",
                    "on-primary-container": "#8392b7",
                    "on-background": "#1d1c16",
                    "primary-fixed": "#d9e2ff",
                    "inverse-on-surface": "#f5f0e7",
                    "surface-variant": "#e7e2d9",
                    "inverse-primary": "#b7c6ee",
                    "primary-container": "#1b2a4a",
                    "tertiary-fixed-dim": "#f3be6a",
                    "primary": "#041534",
                    "surface": "#fef9f0",
                    "on-primary": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "inverse-surface": "#32302a",
                    "outline": "#75777f",
                    "on-tertiary-fixed": "#281800",
                    "surface-container": "#f2ede4",
                    "error-container": "#ffdad6"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "base": "8px",
                    "section-gap": "40px",
                    "touch-target-min": "48px",
                    "margin-mobile": "20px",
                    "gutter-mobile": "16px"
            },
            "fontFamily": {
                    "headline-md": ["Libre Caslon Text"],
                    "body-md": ["Hanken Grotesk"],
                    "display-lg": ["Libre Caslon Text"],
                    "label-sm": ["Hanken Grotesk"],
                    "body-lg": ["Hanken Grotesk"],
                    "display-lg-mobile": ["Libre Caslon Text"]
            },
            "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "display-lg-mobile": ["32px", {"lineHeight": "38px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .active-glow {
            box-shadow: inset 0 0 12px rgba(4, 21, 52, 0.05);
        }
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md selection:bg-primary/10">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-surface border-b border-outline-variant flex justify-between items-center px-margin-mobile h-touch-target-min">
<button aria-label="Menu" class="w-touch-target-min h-touch-target-min flex items-center justify-start text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary tracking-tight">PARCHHAI</h1>
<button aria-label="Cart" class="w-touch-target-min h-touch-target-min flex items-center justify-end text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined">shopping_bag</span>
</button>
</header>
<main class="pt-24 pb-32 px-margin-mobile">
<!-- Profile Header Section -->
<section class="mb-section-gap flex flex-col items-center">
<div class="relative mb-6">
<div class="w-24 h-24 rounded-full overflow-hidden border border-outline-variant p-1 bg-surface">
<img alt="User Profile" class="w-full h-full object-cover rounded-full" data-alt="A sophisticated close-up portrait of a middle-aged man with refined features, captured in a high-fashion editorial style. The lighting is soft and directional, typical of a luxury studio setting, emphasizing texture and depth. He is set against a warm, ivory-toned background that matches a premium light-mode UI. The overall mood is authoritative yet approachable, reflecting a heritage brand's exclusive clientele." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCyEq9dfEGsJDjub48aVb1wXB1F-y1xxkigzFngmqiGKokjRfOS7yxYnalsrH2TdutrOcZzX6YVVHfap4b9EbE1g1asNEn4snUouPiC6pXw-mqMC2yXWCwzGyBe5HNz6gesdKzKmZRj6k5ZITKuR5CaD6yJmuXUT7_22lAxv9Mj4SML2RM1Ey-MDdSwtdNYNwFetM2N_f557UTNhgVxWsIG9kFd4VEVQ1EaEXxC0RYHOB_rZ2Iq16sq-nM-r7EBFbSJrzYFXYBJvKeS"/>
</div>
<div class="absolute bottom-0 right-0 bg-secondary text-on-secondary px-3 py-1 rounded-full text-label-sm font-label-sm shadow-sm">
                    ELITE TIER
                </div>
</div>
<div class="text-center">
<h2 class="font-headline-md text-headline-md text-primary mb-1">Julian Vane</h2>
<p class="font-body-md text-body-md text-on-surface-variant opacity-70">Member since October 2021</p>
</div>
</section>
<!-- Bento Grid Quick Access -->
<section class="grid grid-cols-2 gap-4">
<!-- Large Hero Tile: My Orders -->
<button class="col-span-2 p-6 bg-surface-container border border-outline-variant rounded-lg flex flex-col justify-between items-start text-left min-h-[140px] active:scale-[0.98] transition-all hover:bg-surface-container-high group">
<span class="material-symbols-outlined text-primary mb-4" style="font-size: 32px;">inventory_2</span>
<div>
<h3 class="font-headline-md text-headline-md text-primary">My Orders</h3>
<p class="font-body-md text-body-md text-on-surface-variant">Track your recent shipments</p>
</div>
<span class="absolute top-6 right-6 material-symbols-outlined text-outline group-hover:translate-x-1 transition-transform">arrow_forward_ios</span>
</button>
<!-- Grid Tiles -->
<button class="p-6 bg-surface border border-outline-variant rounded-lg flex flex-col items-center text-center active:scale-[0.98] transition-all hover:bg-surface-container-low">
<span class="material-symbols-outlined text-secondary mb-3" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="font-label-sm text-label-sm text-primary uppercase tracking-widest">Wishlist</span>
</button>
<button class="p-6 bg-surface border border-outline-variant rounded-lg flex flex-col items-center text-center active:scale-[0.98] transition-all hover:bg-surface-container-low">
<span class="material-symbols-outlined text-primary mb-3">location_on</span>
<span class="font-label-sm text-label-sm text-primary uppercase tracking-widest">Addresses</span>
</button>
<button class="p-6 bg-surface border border-outline-variant rounded-lg flex flex-col items-center text-center active:scale-[0.98] transition-all hover:bg-surface-container-low">
<span class="material-symbols-outlined text-primary mb-3">confirmation_number</span>
<span class="font-label-sm text-label-sm text-primary uppercase tracking-widest">Coupons</span>
</button>
<button class="p-6 bg-surface border border-outline-variant rounded-lg flex flex-col items-center text-center active:scale-[0.98] transition-all hover:bg-surface-container-low">
<span class="material-symbols-outlined text-primary mb-3">help</span>
<span class="font-label-sm text-label-sm text-primary uppercase tracking-widest">Help</span>
</button>
<!-- Bottom Full-Width Settings -->
<button class="col-span-2 p-5 bg-surface-container-low border border-outline-variant rounded-lg flex items-center justify-between active:scale-[0.99] transition-all">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary">settings</span>
<span class="font-body-lg text-body-lg text-primary font-semibold">Settings</span>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</button>
</section>
<!-- Secondary List for Premium Services -->
<section class="mt-section-gap">
<h4 class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-[0.2em] mb-4">Curated Services</h4>
<div class="space-y-2">
<div class="p-4 border-b border-outline-variant flex items-center justify-between">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-tertiary-container">workspace_premium</span>
<span class="font-body-md text-body-md">Personal Concierge</span>
</div>
<span class="text-label-sm font-label-sm text-secondary">ACTIVE</span>
</div>
<div class="p-4 border-b border-outline-variant flex items-center justify-between">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-primary-container">auto_fix_high</span>
<span class="font-body-md text-body-md">Bespoke Tailoring</span>
</div>
<span class="material-symbols-outlined text-outline">chevron_right</span>
</div>
</div>
</section>
<!-- Logout CTA -->
<div class="mt-12 flex justify-center">
<button class="text-error font-label-sm text-label-sm uppercase tracking-widest py-3 px-8 border border-error/20 rounded-full active:bg-error/5 transition-colors">
                Log Out
            </button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 w-full z-50 pb-safe bg-surface/90 backdrop-blur-md border-t border-outline-variant shadow-sm flex justify-around items-center h-16">
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-low transition-colors w-1/5 h-full active:scale-95 duration-150">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm">Home</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-low transition-colors w-1/5 h-full active:scale-95 duration-150">
<span class="material-symbols-outlined">storefront</span>
<span class="font-label-sm text-label-sm">Shop</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-low transition-colors w-1/5 h-full active:scale-95 duration-150">
<span class="material-symbols-outlined">search</span>
<span class="font-label-sm text-label-sm">Search</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-low transition-colors w-1/5 h-full active:scale-95 duration-150">
<span class="material-symbols-outlined">favorite</span>
<span class="font-label-sm text-label-sm">Wishlist</span>
</button>
<!-- ACTIVE TAB: Account -->
<button class="flex flex-col items-center justify-center text-primary font-bold hover:bg-surface-container-low transition-colors w-1/5 h-full active-glow">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-sm text-label-sm">Account</span>
</button>
</nav>
<script>
        // Micro-interaction for tiles
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                // Haptic feedback simulation or ripple effect can be added here
                this.classList.add('active:scale-95');
            });
        });
    </script>
</body></html>

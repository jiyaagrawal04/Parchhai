<style>
        body {
            background-color: #1d1c16;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .phone-frame {
            width: 375px;
            height: 812px;
            background: #fef9f0;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 0 12px #32302a, 0 0 0 15px #45464e;
        }
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 30px;
            background: #32302a;
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            z-index: 100;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .stagger-in {
            animation: fadeInUp 0.8s ease forwards;
            opacity: 0;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hero-zoom {
            animation: subtleZoom 20s infinite alternate linear;
        }
        @keyframes subtleZoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body>
<!-- Mobile Phone Frame -->
<div class="phone-frame">
<div class="notch"></div>
<!-- Main Onboarding Content -->
<div class="relative h-full w-full flex flex-col bg-background overflow-hidden">
<!-- Hero Image Section (Asymmetric Editorial Layout) -->
<div class="relative h-[60%] w-full overflow-hidden">
<div class="absolute inset-0 z-10 bg-gradient-to-t from-background via-transparent to-transparent"></div>
<img alt="Heritage Craft Detail" class="hero-zoom w-full h-full object-cover" data-alt="A macro close-up of traditional Ajrakh hand-block printed textile featuring intricate geometric patterns in deep indigo, rich madder red, and ivory. The lighting is soft and natural, emphasizing the organic texture of the hand-woven cotton fabric and the slight imperfections of the natural dye. The aesthetic is heritage-focused and editorial, capturing a sense of historical craftsmanship and premium tactile quality within a modern minimalist frame." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDfZgXYl_7fx6QQXJju9-bl2ZHfsFuR-7QQ3Dw_hk8m0MnxURz83iXt1lRLf8We-1A2PYQlZ6Wpx3D-rmqJtGk08K9QUHhf2H8splFyAxb3VM6AbBev0UpvdyZW9l5_N3qMmaWfKbhy5avdALmwsLacMOaxI2ZNWyVJ-q-s14hAT8ktHWl_Q5hNHmyOgFBypuJIT91dbSS7EWwqCswSqnXw2Jh1yxQBuF0tJwTepLPBtHy7nCU9h-hlC_ytmrGP55YWnoJCCqsMkUG7"/>
<!-- Floating Branding Element -->
<div class="absolute top-16 left-margin-mobile z-20">
<span class="font-display-lg-mobile text-display-lg-mobile text-primary tracking-tight stagger-in" style="animation-delay: 0.2s;">
                        PARCHHAI
                    </span>
</div>
</div>
<!-- Content Canvas -->
<div class="flex-1 px-margin-mobile flex flex-col justify-between pb-12 relative z-20">
<!-- Textual Content -->
<div class="space-y-4 pt-4">
<h1 class="font-headline-md text-display-lg-mobile text-primary stagger-in" style="animation-delay: 0.4s;">
                        Heritage Crafts
                    </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant stagger-in" style="animation-delay: 0.6s;">
                        Discover the soul of Indian textiles, preserved for the modern world.
                    </p>
</div>
<!-- Interaction Zone -->
<div class="space-y-8 stagger-in" style="animation-delay: 0.8s;">
<!-- Pagination Dots -->
<div class="flex gap-2">
<div class="h-1.5 w-8 rounded-full bg-primary transition-all duration-300"></div>
<div class="h-1.5 w-1.5 rounded-full bg-outline-variant"></div>
<div class="h-1.5 w-1.5 rounded-full bg-outline-variant"></div>
</div>
<!-- Actions -->
<div class="flex items-center justify-between">
<button class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors uppercase tracking-widest">
                            Skip
                        </button>
<button class="group flex items-center justify-center bg-primary text-on-primary w-touch-target-min h-touch-target-min rounded-full shadow-lg active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</div>
<!-- Decorative Texture Overlay -->
<div class="absolute inset-0 pointer-events-none opacity-[0.03] mix-blend-multiply bg-[url('https://www.transparenttextures.com/patterns/natural-paper.png')]"></div>
</div>
<!-- Safe Area Home Indicator -->
<div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-on-surface/20 rounded-full z-50"></div>
</div>
<script>
        // Simple Interaction logic
        document.querySelector('button.group').addEventListener('click', function() {
            // Visual feedback for transition
            const content = document.querySelector('.phone-frame');
            content.style.transition = 'opacity 0.5s ease';
            content.style.opacity = '0.7';
            setTimeout(() => {
                content.style.opacity = '1';
                alert('Navigating to next heritage story...');
            }, 500);
        });

        // Skip logic
        document.querySelector('button.font-label-sm').addEventListener('click', function() {
            alert('Welcome to the Parchhai collection.');
        });
    </script>
</body></html>

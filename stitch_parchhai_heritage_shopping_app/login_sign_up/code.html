<input class="w-full h-16 bg-surface-container-low border-b-2 border-outline-variant text-center font-headline-md text-headline-md focus:border-on-tertiary-container focus:ring-0 transition-all" maxlength="1" type="number"/>
<input class="w-full h-16 bg-surface-container-low border-b-2 border-outline-variant text-center font-headline-md text-headline-md focus:border-on-tertiary-container focus:ring-0 transition-all" maxlength="1" type="number"/>
<input class="w-full h-16 bg-surface-container-low border-b-2 border-outline-variant text-center font-headline-md text-headline-md focus:border-on-tertiary-container focus:ring-0 transition-all" maxlength="1" type="number"/>
<input class="w-full h-16 bg-surface-container-low border-b-2 border-outline-variant text-center font-headline-md text-headline-md focus:border-on-tertiary-container focus:ring-0 transition-all" maxlength="1" type="number"/>
</div>
<button class="w-full bg-primary text-on-primary h-touch-target-min rounded-lg font-label-sm text-label-sm uppercase tracking-widest mb-4">
                Verify &amp; Enter
            </button>
<button class="w-full text-on-tertiary-container font-label-sm text-label-sm py-2">
                Resend Code in 00:59
            </button>
<div class="h-safe pb-4"></div>
</div>
</div>
<script>
        function triggerOTP() {
            const sheet = document.getElementById('otp-sheet');
            const content = document.getElementById('sheet-content');
            sheet.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('translate-y-full');
            }, 10);
        }

        function closeOTP() {
            const sheet = document.getElementById('otp-sheet');
            const content = document.getElementById('sheet-content');
            content.classList.add('translate-y-full');
            setTimeout(() => {
                sheet.classList.add('hidden');
            }, 500);
        }

        // Handle auto-focus for OTP inputs
        const inputs = document.querySelectorAll('#otp-sheet input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                if (input.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
        });

        // Atmospheric Effect: Subtle movement on scroll
        window.addEventListener('scroll', () => {
            const scroll = window.scrollY;
            const backdrop = document.querySelector('img[data-alt]');
            if(backdrop) {
                backdrop.style.transform = `translateY(${scroll * 0.2}px)`;
            }
        });
    </script>
